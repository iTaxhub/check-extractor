  <line x1="33" y1="50" x2="68" y2="20" stroke="#34d399" stroke-width="11" stroke-linecap="round"/>
  <line x1="33" y1="50" x2="68" y2="80" stroke="#818cf8" stroke-width="11" stroke-linecap="round"/>
  <!-- Wordmark — white -->
  <text x="118" y="72"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-weight="800"
