<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="stemGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#10b981"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- No background — transparent, for use on any colored bg -->
  <!-- K vertical stem — gradient green (top) to purple (bottom) -->
  <rect x="22" y="20" width="11" height="60" rx="5.5" fill="url(#stemGrad)"/>
  <!-- K upper arm — green -->
  <line x1="33" y1="50" x2="68" y2="20" stroke="#10b981" stroke-width="11" stroke-linecap="round"/>
  <!-- K lower arm — purple -->
  <line x1="33" y1="50" x2="68" y2="80" stroke="#6366f1" stroke-width="11" stroke-linecap="round"/>
</svg>
